name: OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build OpenWrt bundle (aarch64-musl)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TARGET: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: openwrt-${{ env.TARGET }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      # musl cross toolchain for the linker. reqwest uses rustls (no OpenSSL)
      # and the server binary pulls no C deps, so this is enough for a fully
      # static aarch64 build.
      - name: Install musl cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cross-compile server binary
        run: |
          set -euo pipefail
          # The WebUI was built into ./dist on the host. `cross` builds inside a
          # container that only mounts ./src-tauri, so expose ../dist to it via
          # the MICLAW_DIST_DIR volume declared in src-tauri/Cross.toml.
          export MICLAW_DIST_DIR="$GITHUB_WORKSPACE/dist"
          test -f "$MICLAW_DIST_DIR/index.html" || { echo "!! dist/ not built" >&2; exit 1; }
          cd src-tauri
          cross build --release --no-default-features \
            --target "$TARGET" --bin miclaw_api_bridge

      - name: Stage + strip binary
        id: bin
        run: |
          set -euo pipefail
          mkdir -p openwrt/out
          BIN="src-tauri/target/$TARGET/release/miclaw_api_bridge"
          cp -f "$BIN" openwrt/out/miclaw_api_bridge
          # cross images ship a target strip; fall back to llvm-strip
          docker run --rm -v "$PWD:/w" -w /w \
            ghcr.io/cross-rs/$TARGET:main \
            aarch64-linux-musl-strip openwrt/out/miclaw_api_bridge \
            || llvm-strip openwrt/out/miclaw_api_bridge || true
          file openwrt/out/miclaw_api_bridge || true

      - name: Pack deployable bundle
        run: |
          set -euo pipefail
          NAME="miclaw_api_bridge_${GITHUB_REF_NAME}_openwrt_aarch64.tar.gz"
          echo "BUNDLE=$NAME" >> "$GITHUB_ENV"
          bash openwrt/pack-bundle.sh openwrt/out/miclaw_api_bridge "openwrt/out/$NAME"

      - name: Build opkg ipk
        run: |
          set -euo pipefail
          # strip leading 'v' from the tag for the package version (0.1.0 not v0.1.0)
          ver="${GITHUB_REF_NAME#v}"
          [ "$ver" = "$GITHUB_REF_NAME" ] && ver="0.0.0-dev"
          IPK="luci-app-miclaw_${ver}-1_aarch64_cortex-a53.ipk"
          echo "IPK=$IPK" >> "$GITHUB_ENV"
          PKG_VERSION="$ver" PKG_ARCH="aarch64_cortex-a53" \
            bash openwrt/build-ipk.sh openwrt/out/miclaw_api_bridge "openwrt/out/$IPK"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-aarch64
          path: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
          if-no-files-found: error

      - name: Compute date version
        id: ver
        run: echo "date=$(TZ=Asia/Shanghai date +'%y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "miclaw_api_bridge ${{ github.ref_name }} (${{ steps.ver.outputs.date }})"
          body: "Draft release generated by GitHub Actions · build ${{ steps.ver.outputs.date }}. Assets include headless CLI/server, desktop tray binaries, the OpenWrt LuCI bundle (tar.gz) and an opkg-installable .ipk."
          draft: true
          prerelease: false
          files: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
