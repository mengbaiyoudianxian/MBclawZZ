server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    client_max_body_size 200M;

    # analysis file download
    location /analysis {
        alias /var/www/mbclaw/;
        types { text/plain md; }
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Disposition "attachment; filename=\"MBclaw全项目超详细分析.md\"";
    }

    # v1 API直接代理到bridge
    location /bridge/miclaw/v1/ {
        proxy_pass http://100.126.55.0:8765/v1/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # OpenHands WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # OpenHands web UI
    location /openhands/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        sub_filter '127.0.0.1:3000' '$host';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    # 其他请求走uvicorn
    location /status { default_type application/json; return 200 "ok"; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
