version: "3.9"
services:
  token-pool:
    build: .
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - token_pool_data:/var/lib/token_pool
    env_file: .env
    environment:
      - TP_DATA=/var/lib/token_pool
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8100/health"]
      interval: 30s; timeout: 5s; retries: 3
volumes:
  token_pool_data:
