server {
    listen 8080;
    server_name _;

    location /ws {
        proxy_pass http://127.0.0.1:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host:$server_port;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host:$server_port;
        proxy_http_version 1.1;
        proxy_buffering off;
        sub_filter '</body>' '<script>document.addEventListener("DOMContentLoaded",function(){if(!sessionStorage.getItem("oh_started")){sessionStorage.setItem("oh_started","1");var b=document.getElementById("start");if(b)b.click();}});</script></body>';
        sub_filter '127.0.0.1:3000' '$host:8080';
        sub_filter_once off;
        sub_filter_types text/html;
    }
}
