global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "mbclaw-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["mbclaw-api:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
