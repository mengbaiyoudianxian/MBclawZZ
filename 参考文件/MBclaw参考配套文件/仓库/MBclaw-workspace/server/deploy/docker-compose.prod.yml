version: '3.8'

services:
  mbclaw-api:
    build:
      context: ../../main/MBclaw-Lite
      dockerfile: Dockerfile
    container_name: mbclaw-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
    volumes:
      - mbclaw_data:/app/data
      - mbclaw_memory:/app/memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  admin-panel:
    image: nginx:alpine
    container_name: mbclaw-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../admin_panel:/app/admin_panel:ro
      - ../gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mbclaw-api

  prometheus:
    image: prom/prometheus:latest
    container_name: mbclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: mbclaw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-mbclaw}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mbclaw_data:
  mbclaw_memory:
  prometheus_data:
  grafana_data:
